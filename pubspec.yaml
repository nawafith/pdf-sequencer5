name: pdf_sequencer
description: A new Flutter project for generating sequential PDF invoices.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  file_picker: ^8.0.0
  syncfusion_flutter_pdf: ^33.2.15
  path_provider: ^2.1.3
  pdfx: ^2.6.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
